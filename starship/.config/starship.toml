format = """
$username\
$hostname\
$kubernetes\
$directory\
$git_branch\
$git_state\
$cmd_duration\
$line_break\
$python\
$character"""

[directory]
style = "blue"

[character]
success_symbol = "[‚ĚĮ](purple)"
error_symbol = "[‚ĚĮ](red)"
vimcmd_symbol = "[‚Ěģ](green)"

[git_branch]
format = "[$branch]($style)"
style = "bright-white"

# Disabled: git_status scans the whole worktree on every prompt (~20ms here, much
# worse in large repos). Branch name is all I usually need. Re-enable by flipping
# disabled and re-adding $git_status to the format above.
[git_status]
disabled = true
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "‚Äč"
untracked = "‚Äč"
modified = "‚Äč"
staged = "‚Äč"
renamed = "‚Äč"
deleted = "‚Äč"
stashed = "‚Č°"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"

[kubernetes]
format = '[$symbol\[[$context](bold fg:purple) $namespace\]](fg:bright-blue) '
disabled = false

